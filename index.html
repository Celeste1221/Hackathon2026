<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Mexico FoodResQ</title>
 <img src="logo.png" alt="Company Logo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ec;
    --surface: #fffef9;
    --border: #ddd8cc;
    --text: #1a1814;
    --muted: #6b6457;
    --accent: #c84b2f;
    --warn: #d97706;
    --ok: #2d7a4f;
    --info: #1e5fa8;
    --red-bg: #fef2ee;
    --orange-bg: #fef7ee;
    --yellow-bg: #fefce8;
    --green-bg: #edfaf4;
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }

  header {
    background: var(--text); color: var(--bg);
    padding: 16px 24px 14px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    height: 64px;
  }
  header h1 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; letter-spacing: -0.3px; line-height: 1.15; }
  header h1 span { color: #e87a60; font-weight: 600; }
  .header-meta { font-size: 11px; color: #888; text-align: right; white-space: nowrap; }

  .summary-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
    height: 64px;
  }
  .summary-card { background: var(--surface); padding: 10px 16px; display: flex; flex-direction: column; gap: 2px; }
  .summary-card .val { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; line-height: 1; }
  .summary-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .summary-card.red .val { color: var(--accent); }
  .summary-card.orange .val { color: var(--warn); }
  .summary-card.green .val { color: var(--ok); }
  .summary-card.blue .val { color: var(--info); }

  .layout {
    display: grid; grid-template-columns: 320px 1fr;
    height: calc(100vh - 128px); overflow: hidden;
  }

  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-controls {
    padding: 10px 10px 8px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 7px;
  }
  .sidebar-controls label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); margin-bottom: 2px; display: block;
  }
  .sidebar-controls select {
    width: 100%; font-family: 'DM Mono', monospace; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 8px; color: var(--text); appearance: none; cursor: pointer;
  }
  .sort-row { display: flex; gap: 5px; }
  .sort-btn {
    flex: 1; padding: 4px 2px; font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; color: var(--muted); text-align: center;
  }
  .sort-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .range-row { display: flex; align-items: center; gap: 8px; }
  .range-row input[type=range] { flex: 1; }
  #minPriorityLabel { font-size: 11px; font-weight: 500; min-width: 28px; text-align: right; }

  .tract-count { font-size: 11px; color: var(--muted); padding: 6px 10px 3px; }
  .tract-list { flex: 1; overflow-y: auto; padding: 2px 6px 6px; }
  .tract-item {
    padding: 8px 9px; border-radius: 5px; cursor: pointer; margin-bottom: 3px;
    border: 1px solid transparent; transition: background 0.1s;
  }
  .tract-item:hover { background: var(--bg); border-color: var(--border); }
  .tract-item.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  .tract-item.selected .tract-meta { color: #aaa; }
  .tract-header { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 3px; }
  .tract-id { font-size: 11px; font-weight: 500; }
  .priority-badge { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
  .p-critical { background: var(--red-bg); color: var(--accent); }
  .p-high { background: var(--orange-bg); color: var(--warn); }
  .p-medium { background: var(--yellow-bg); color: #92400e; }
  .p-low { background: var(--green-bg); color: var(--ok); }
  .selected .p-critical,.selected .p-high,.selected .p-medium,.selected .p-low { background: rgba(255,255,255,0.15); color: #fff; }
  .tract-meta { display: flex; gap: 6px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }

  .map-area { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
  #map { flex: 1; }

  .detail-panel {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 18px; display: grid; grid-template-columns: repeat(6,1fr);
    gap: 10px; align-items: start; min-height: 100px; max-height: 110px;
  }
  .detail-empty { grid-column: 1/-1; color: var(--muted); font-size: 12px; display: flex; align-items: center; }
  .detail-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 2px; display: block; }
  .detail-field .val { font-size: 13px; font-weight: 500; }
  .detail-field .val.accent { color: var(--accent); }
  .detail-field .val.warn { color: var(--warn); }
  .detail-field .val.ok { color: var(--ok); }
  .intervention-chip {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    font-weight: 500; background: var(--red-bg); color: var(--accent);
    border: 1px solid #f5c4b3; word-break: break-word; line-height: 1.4;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #e8e3d8; font-family: 'DM Mono', monospace; }
  .leaflet-popup-content-wrapper {
    background: #1a1814; color: #f5f2ec; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 12px; box-shadow: none;
  }
  .leaflet-popup-tip { background: #1a1814; }
  .leaflet-popup-content { margin: 10px 14px; line-height: 1.6; }
  .leaflet-popup-close-button { color: #888 !important; }
  .popup-score { font-size: 16px; font-weight: bold; }
  .popup-critical { color: #e87a60; }
  .popup-high { color: #e07b30; }
  .popup-medium { color: #d4a017; }
  .popup-low { color: #5ab382; }
</style>
</head>
<body>

<header>
  <div>
    <h1>New Mexico &nbsp;<span>Food Desert Triage Dashboard</span></h1>
  </div>
  <div class="header-meta">612 census tracts · Hackathon Access Model v7</div>
</header>

<div class="summary-bar">
  <div class="summary-card red"><span class="val" id="s-noaccess">—</span><span class="lbl">No Access Tracts</span></div>
  <div class="summary-card orange"><span class="val" id="s-critical">—</span><span class="lbl">Critical Priority ≥ 3.0</span></div>
  <div class="summary-card blue"><span class="val" id="s-highpov">—</span><span class="lbl">High Poverty Tracts</span></div>
  <div class="summary-card green"><span class="val" id="s-stable">—</span><span class="lbl">Stable Access</span></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-controls">
      <div>
        <label>Filter by access level</label>
        <select id="filterAccess">
          <option value="all">All access levels</option>
          <option value="No Access">No Access only</option>
          <option value="Low Access">Low Access only</option>
          <option value="Moderate Access">Moderate Access</option>
          <option value="High Access">High Access</option>
        </select>
      </div>
      <div>
        <label>Filter by intervention type</label>
        <select id="filterIntervention">
          <option value="all">All interventions</option>
          <option value="Affordability Gap (SNAP / Pricing)">Affordability Gap (SNAP)</option>
          <option value="Logistics / Distribution Optimization">Logistics / Distribution</option>
          <option value="Public Intervention (Mobile + Subsidy)">Mobile / Public Subsidy</option>
          <option value="Retail Expansion Opportunity">Retail Expansion</option>
          <option value="Stable Market">Stable Market</option>
        </select>
      </div>
      <div>
        <label>Min priority score: <span id="minPriorityLabel">0.0</span></label>
        <div class="range-row">
          <input type="range" id="minPriority" min="0" max="4" step="0.1" value="0">
        </div>
      </div>
      <div>
        <label>Sort by</label>
        <div class="sort-row">
          <button class="sort-btn active" data-sort="priority">Priority</button>
          <button class="sort-btn" data-sort="poverty">Poverty</button>
          <button class="sort-btn" data-sort="distance">Distance</button>
          <button class="sort-btn" data-sort="nocar">No Car</button>
        </div>
      </div>
    </div>
    <div class="tract-count" id="tractCount">Loading…</div>
    <div class="tract-list" id="tractList"></div>
  </div>

  <div class="map-area">
    <div id="map"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">Select a tract from the list or click a dot on the map to see details.</div>
    </div>
  </div>
</div>

let filtered = [...TRACTS];
let selected = null;
let sortKey = 'priority';
let markers = {};
let markerLayer = null;

// ---- LEAFLET MAP INIT ----
const map = L.map('map', {
  center: [34.5, -106.2],
  zoom: 7,
  zoomControl: true,
  attributionControl: true,
});

// OpenStreetMap tiles with a clean style
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
  opacity: 0.85,
}).addTo(map);

// ---- PRIORITY UTILS ----
function getPriority(score) {
  if (score >= 3.0) return { cls: 'p-critical', label: 'Critical', color: '#c84b2f', popupCls: 'popup-critical' };
  if (score >= 2.5) return { cls: 'p-high',     label: 'High',     color: '#e07b30', popupCls: 'popup-high' };
  if (score >= 2.0) return { cls: 'p-medium',   label: 'Medium',   color: '#d4a017', popupCls: 'popup-medium' };
  return               { cls: 'p-low',       label: 'Low',      color: '#2d7a4f', popupCls: 'popup-low' };
}

function makeCircleMarker(t) {
  const p = getPriority(t.priority_score);
  return L.circleMarker([t.lat, t.lon], {
    radius: 6,
    fillColor: p.color,
    color: '#fff',
    weight: 0.8,
    opacity: 0.9,
    fillOpacity: 0.82,
  });
}

// ---- RENDER MAP MARKERS ----
function renderMapMarkers() {
  if (markerLayer) map.removeLayer(markerLayer);
  markerLayer = L.layerGroup();
  markers = {};

  const filteredIds = new Set(filtered.map(t => t.tract_id));

  TRACTS.forEach(t => {
    const inFilter = filteredIds.has(t.tract_id);
    const p = getPriority(t.priority_score);

    const marker = L.circleMarker([t.lat, t.lon], {
      radius: inFilter ? 6 : 4,
      fillColor: inFilter ? p.color : '#aaa9a5',
      color: (selected && selected.tract_id === t.tract_id) ? '#1a1814' : '#fff',
      weight: (selected && selected.tract_id === t.tract_id) ? 2.5 : 0.7,
      opacity: 1,
      fillOpacity: inFilter ? 0.82 : 0.3,
    });

    marker.on('click', () => selectTract(t));
    marker.on('mouseover', function() {
      const pp = getPriority(t.priority_score);
      this.bindPopup(`
        <div style="min-width:160px">
          <div style="font-size:11px;color:#aaa;margin-bottom:4px">Tract ${String(t.tract_id).slice(-6)}</div>
          <div class="popup-score ${pp.popupCls}">${t.priority_score.toFixed(2)} — ${pp.label}</div>
          <div style="margin-top:6px;font-size:11px;line-height:1.8">
            ${t.access_label}<br>
            ${t.poverty_band} (${t.poverty_rate.toFixed(1)}%)<br>
            ${t.distance_miles.toFixed(2)} mi to nearest store<br>
            ${t.grocery_count} grocery · ${t.snap_store_count} SNAP
          </div>
        </div>`, { closeButton: false, autoPan: false }).openPopup();
    });
    marker.on('mouseout', function() { this.closePopup(); });

    markers[t.tract_id] = marker;
    markerLayer.addLayer(marker);
  });

  markerLayer.addTo(map);
}

// ---- LEGEND ----
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div');
  div.style.cssText = 'background:#fffef9;border:1px solid #ddd8cc;border-radius:6px;padding:10px 13px;font-family:DM Mono,monospace;font-size:11px;';
  div.innerHTML = `
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#6b6457;margin-bottom:6px">Priority Score</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:10px;height:10px;border-radius:50%;background:#c84b2f;flex-shrink:0"></div>Critical ≥ 3.0</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:10px;height:10px;border-radius:50%;background:#e07b30;flex-shrink:0"></div>High 2.5 – 3.0</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:10px;height:10px;border-radius:50%;background:#d4a017;flex-shrink:0"></div>Medium 2.0 – 2.5</div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#2d7a4f;flex-shrink:0"></div>Low &lt; 2.0</div>`;

};
legend.addTo(map);

// ---- SUMMARY ----
function updateSummary() {
  document.getElementById('s-noaccess').textContent = TRACTS.filter(t => t.access_label === 'No Access').length;
  document.getElementById('s-critical').textContent = TRACTS.filter(t => t.priority_score >= 3.0).length;
  document.getElementById('s-highpov').textContent = TRACTS.filter(t => t.poverty_band === 'High Poverty').length;
  document.getElementById('s-stable').textContent = TRACTS.filter(t => t.final_intervention_strategy === 'Stable Access').length;
}

// ---- FILTERS ----
function applyFilters() {
  const access = document.getElementById('filterAccess').value;
  const intervention = document.getElementById('filterIntervention').value;
  const minP = parseFloat(document.getElementById('minPriority').value);
  filtered = TRACTS.filter(t => {
    if (access !== 'all' && t.access_label !== access) return false;
    if (intervention !== 'all' && t.intervention_strategy !== intervention) return false;
    if (t.priority_score < minP) return false;
    return true;
  });
  applySort();
}

function applySort() {
  filtered.sort((a,b) => {
    if (sortKey === 'priority') return b.priority_score - a.priority_score;
    if (sortKey === 'poverty') return b.poverty_rate - a.poverty_rate;
    if (sortKey === 'distance') return b.distance_miles - a.distance_miles;
    if (sortKey === 'nocar') return b.no_car_rate - a.no_car_rate;
    return 0;
  });
  renderList();
  renderMapMarkers();
}

// ---- SIDEBAR LIST ----
function renderList() {
  const list = document.getElementById('tractList');
  document.getElementById('tractCount').textContent = `${filtered.length} tracts shown`;
  list.innerHTML = '';
  filtered.forEach(t => {
    const p = getPriority(t.priority_score);
    const div = document.createElement('div');
    div.className = 'tract-item' + (selected && selected.tract_id === t.tract_id ? ' selected' : '');
    div.innerHTML = `
      <div class="tract-header">
        <span class="tract-id">Tract ${String(t.tract_id).slice(-6)}</span>
        <span class="priority-badge ${p.cls}">Score ${t.priority_score.toFixed(2)}</span>
      </div>
      <div class="tract-meta">
        <span>${t.access_label}</span>
        <span>·</span><span>${t.poverty_band}</span>
        <span>·</span><span>${t.distance_miles.toFixed(1)} mi</span>
      </div>`;
    div.addEventListener('click', () => selectTract(t));
    list.appendChild(div);
  });
}

// ---- SELECT TRACT ----
function selectTract(t) {
  selected = t;
  renderList();
  renderDetail(t);
  renderMapMarkers();
  map.setView([t.lat, t.lon], Math.max(map.getZoom(), 10), { animate: true });
  const idx = filtered.findIndex(x => x.tract_id === t.tract_id);
  const items = document.querySelectorAll('.tract-item');
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
}

function renderDetail(t) {
  const p = getPriority(t.priority_score);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-field">
      <label>Tract ID</label>
      <div class="val">${t.tract_id}</div>
    </div>
    <div class="detail-field">
      <label>Priority Score</label>
      <div class="val accent">${t.priority_score.toFixed(2)} — ${p.label}</div>
    </div>
    <div class="detail-field">
      <label>Access Level</label>
      <div class="val">${t.access_label}</div>
    </div>
    <div class="detail-field">
      <label>Poverty Rate</label>
      <div class="val ${t.poverty_rate > 30 ? 'accent' : t.poverty_rate > 20 ? 'warn' : 'ok'}">${t.poverty_rate.toFixed(1)}%</div>
    </div>
    <div class="detail-field">
      <label>Nearest Store</label>
      <div class="val">${t.distance_miles.toFixed(2)} mi</div>
    </div>
    <div class="detail-field">
      <label>No-Car Rate</label>
      <div class="val ${t.no_car_rate > 0.2 ? 'accent' : ''}">${(t.no_car_rate * 100).toFixed(1)}%</div>
    </div>
    <div class="detail-field" style="grid-column:span 2">
      <label>Stores</label>
      <div class="val">${t.grocery_count} grocery · ${t.store_count} total · ${t.snap_store_count} SNAP</div>
    </div>
    <div class="detail-field" style="grid-column:span 4">
      <label>Recommended Intervention</label>
      <div class="intervention-chip">${t.final_intervention_strategy}</div>
    </div>`;
}

// ---- EVENT LISTENERS ----
document.getElementById('filterAccess').addEventListener('change', applyFilters);
document.getElementById('filterIntervention').addEventListener('change', applyFilters);
document.getElementById('minPriority').addEventListener('input', function() {
  document.getElementById('minPriorityLabel').textContent = parseFloat(this.value).toFixed(1);
  applyFilters();
});
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    sortKey = this.dataset.sort;
    applySort();
  });
});

// ---- INIT ----
updateSummary();
applyFilters();

// Fix map size after layout settles
setTimeout(() => map.invalidateSize(), 100);
</script>
</body>
</html>
